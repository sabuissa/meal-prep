<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuisine Meal Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>Cuisine Meal Planner</h1>
    <p class="tagline">Browse dishes by world cuisine and build your meal plan</p>
  </header>

  <main>
    <section class="browse-section" aria-labelledby="browse-heading">
      <h2 id="browse-heading">Browse by Cuisine</h2>

      <div class="cuisine-selector">
        <label for="cuisine-select">Cuisine</label>
        <select id="cuisine-select" aria-label="Cuisine filter">
          <option value="">Select a cuisine…</option>
          <!-- Cuisine options populated by script.js -->
        </select>
      </div>

      <div id="dishes-status" class="status-area" role="status" aria-live="polite"></div>

      <div id="dishes-grid" class="dishes-grid">
        <!-- Dish cards populated by script.js -->
      </div>
    </section>

    <section class="plan-section" aria-labelledby="plan-heading">
      <div class="section-heading-row">
        <h2 id="plan-heading">My Meal Plan</h2>
        <button type="button" id="save-day-btn" class="save-day-btn">Save to Day</button>
      </div>

      <p id="active-day-indicator" class="active-day-indicator"></p>

      <div id="plan-status" class="status-area" role="status" aria-live="polite"></div>

      <ul id="meal-plan-list" class="meal-plan-list">
        <!-- Meal plan entries populated by script.js -->
      </ul>
    </section>

    <section class="saved-days-section" aria-labelledby="saved-days-heading">
      <h2 id="saved-days-heading">Saved Days</h2>

      <div id="saved-days-status" class="status-area" role="status" aria-live="polite"></div>

      <ul id="saved-days-list" class="saved-days-list">
        <!-- Saved day entries populated by script.js -->
      </ul>
    </section>

    <section class="shopping-section" aria-labelledby="shopping-heading">
      <h2 id="shopping-heading">Shopping List</h2>

      <div id="shopping-status" class="status-area" role="status" aria-live="polite"></div>

      <ul id="shopping-list" class="shopping-list">
        <!-- Consolidated ingredients populated by script.js -->
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <p>Recipe data courtesy of <a href="https://www.themealdb.com/" target="_blank" rel="noopener">TheMealDB</a>.</p>
  </footer>

  <div id="meal-modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-meal-title">
      <button type="button" id="modal-close" class="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body" class="modal-body">
        <!-- Meal detail content populated by script.js -->
      </div>
    </div>
  </div>

  <div id="save-day-modal-overlay" class="modal-overlay hidden">
    <div class="modal modal-form" role="dialog" aria-modal="true" aria-labelledby="save-day-modal-title">
      <button type="button" id="save-day-modal-close" class="modal-close" aria-label="Close">&times;</button>
      <h3 id="save-day-modal-title">Name this day</h3>
      <form id="save-day-form">
        <input
          type="text"
          id="save-day-input"
          class="modal-input"
          placeholder="e.g. Monday, This Week"
          autocomplete="off"
        />
        <div class="modal-form-actions">
          <button type="button" id="save-day-cancel-btn" class="modal-cancel-btn">Cancel</button>
          <button type="submit" class="modal-save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="day-view-modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="day-view-modal-title">
      <button type="button" id="day-view-modal-close" class="modal-close" aria-label="Close">&times;</button>
      <div id="day-view-modal-body" class="modal-body">
        <!-- Read-only saved-day meal list populated by script.js -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
